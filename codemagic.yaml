workflows:
  build-ios:
    name: Build iOS IPA
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: cd ios && pod install && cd ..
      - name: Install xcodeproj gem
        script: gem install xcodeproj
      - name: Patch Xcode project (disable signing)
        script: |
          ruby -e '
          require "xcodeproj"
          project = Xcodeproj::Project.open("ios/Runner.xcodeproj")
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings["DEVELOPMENT_TEAM"] = "0000000000"
              config.build_settings["CODE_SIGN_IDENTITY"] = "iPhone Developer"
              config.build_settings["CODE_SIGN_STYLE"] = "Manual"
              config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"
              config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"
              config.build_settings["PROVISIONING_PROFILE_SPECIFIER"] = ""
            end
          end
          project.save
          puts "Xcode project patched successfully"
          '
      - name: Build iOS app
        script: flutter build ios --release --no-codesign
      - name: Package IPA
        script: |
          APP_PATH=$(find build/ios -name "Runner.app" -path "*/Release-iphoneos/*" -maxdepth 5 | head -1)
          echo "App found: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found!"
            find build/ios -name "*.app" -type d 2>/dev/null | head -20
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y SleepTalkRecorder.ipa Payload
          rm -rf Payload
          ls -lh SleepTalkRecorder.ipa
    artifacts:
      - SleepTalkRecorder.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com