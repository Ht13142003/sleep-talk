workflows:
  build-ios:
    name: Build iOS IPA
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: cd ios && pod install && cd ..
      - name: Disable code signing
        script: |
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = ""/DEVELOPMENT_TEAM = "0000000000"/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = "iPhone Developer"/g' ios/Runner.xcodeproj/project.pbxproj
      - name: Build iOS app
        script: flutter build ios --release --no-codesign
      - name: Package IPA
        script: |
          APP_PATH=$(find build/ios -name "Runner.app" -path "*/Release-iphoneos/*" -maxdepth 5 | head -1)
          echo "App found: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y SleepTalkRecorder.ipa Payload
          rm -rf Payload
          ls -lh SleepTalkRecorder.ipa
    artifacts:
      - SleepTalkRecorder.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com