workflows:
  build-ios:
    name: Build iOS IPA
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Build iOS IPA (unsigned for third-party signing)
        script: |
          cd ios
          pod install || true
          cd ..
          flutter build ios --release --no-codesign
      - name: Package IPA
        script: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r -y SleepTalkRecorder.ipa Payload/
          rm -rf Payload
    artifacts:
      - SleepTalkRecorder.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com