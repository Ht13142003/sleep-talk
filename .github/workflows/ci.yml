name: Build and Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.27.0'
  APP_VERSION: '1.0.0'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --timeout 10m

      - name: Run analyze
        run: flutter analyze --no-fatal-infos

  build-android:
    name: Build Android APK + AppBundle
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Build Release AppBundle
        run: flutter build appbundle --release

      - name: Verify APK file
        run: |
          echo "=== APK file info ==="
          ls -lh build/app/outputs/flutter-apk/
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            file build/app/outputs/flutter-apk/app-release.apk
            echo "APK size: $(wc -c < build/app/outputs/flutter-apk/app-release.apk) bytes"
          fi

      - name: Verify AppBundle file
        run: |
          echo "=== AppBundle file info ==="
          ls -lh build/app/outputs/bundle/release/
          if [ -f build/app/outputs/bundle/release/app-release.aab ]; then
            file build/app/outputs/bundle/release/app-release.aab
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sleep-talk-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Upload AppBundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: sleep-talk-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

  build-ios:
    name: Build iOS IPA (Unsigned for Personal Signing)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get
          cd ios && pod install && cd ..

      - name: Install xcodeproj gem
        run: gem install xcodeproj

      - name: Patch Xcode project (disable signing entirely)
        run: |
          ruby -e '
          require "xcodeproj"
          project = Xcodeproj::Project.open("ios/Runner.xcodeproj")
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings["DEVELOPMENT_TEAM"] = "0000000000"
              config.build_settings["CODE_SIGN_IDENTITY"] = "iPhone Developer"
              config.build_settings["CODE_SIGN_STYLE"] = "Manual"
              config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"
              config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"
              config.build_settings["PROVISIONING_PROFILE_SPECIFIER"] = ""
              config.build_settings["SWIFT_OPTIMIZATION_LEVEL"] = "-Onone"
            end
          end
          project.save
          puts "Xcode project patched successfully"
          '

      - name: Build iOS app (no codesign)
        run: |
          flutter build ios --release --no-codesign
          echo "=== .app file info ==="
          APP_PATH=$(find build/ios -name "Runner.app" -path "*/Release-iphoneos/*" -maxdepth 5 | head -1)
          echo "Found app at: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            ls -lh "$APP_PATH"
          fi

      - name: Package as IPA
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -path "*/Release-iphoneos/*" -maxdepth 5 | head -1)
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find Runner.app!"
            find build/ios -name "*.app" -type d | head -20
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r -y sleep-talk.ipa Payload
          echo "=== IPA file info ==="
          ls -lh sleep-talk.ipa
          file sleep-talk.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sleep-talk-ios-ipa
          path: sleep-talk.ipa
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-build-${{ github.run_number }}
          name: Release v${{ env.APP_VERSION }} (Build ${{ github.run_number }})
          body: |
            ## Sleep Talk Recorder v${{ env.APP_VERSION }} (Build ${{ github.run_number }})

            ### Build Information
            - **Build Time:** ${{ github.event.head_commit.timestamp }}
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Triggered by:** ${{ github.actor }}

            ### Downloads

            #### Android
            - **APK:** Direct install for Android devices
            - **AAB (App Bundle):** Required for Google Play Store submission

            #### iOS
            - **IPA File:** Unsigned iOS app package (personal signing required)

            ### Installation Guide

            #### Android
            1. Download the `.apk` file
            2. Enable "Install from unknown sources" in Settings
            3. Open the APK file and install

            #### iOS (Personal Signing via 爱思助手)
            1. Download the `.ipa` file
            2. Connect your iPhone to computer
            3. Open 爱思助手 and go to "应用游戏"
            4. Drag and drop the `.ipa` file to install
            5. Trust the developer certificate in Settings → General → Device Management
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}