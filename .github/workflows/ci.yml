name: Build and Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.0'
  APP_VERSION: '1.0.0'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Run analyze
        run: flutter analyze --no-fatal-infos

  build-android:
    name: Build Android APK + AppBundle
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Build Release AppBundle
        run: flutter build appbundle --release

      - name: Verify APK file
        run: |
          echo "=== APK file info ==="
          ls -lh build/app/outputs/flutter-apk/
          file build/app/outputs/flutter-apk/app-release.apk
          echo "APK size: $(wc -c < build/app/outputs/flutter-apk/app-release.apk) bytes"

      - name: Verify AppBundle file
        run: |
          echo "=== AppBundle file info ==="
          ls -lh build/app/outputs/bundle/release/
          file build/app/outputs/bundle/release/app-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sleep-talk-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Upload AppBundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: sleep-talk-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

  build-ios:
    name: Build iOS Simulator App (no signing required)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS simulator app
        run: |
          flutter build ios --debug --simulator
          echo "=== Simulator .app ==="
          ls -lh build/ios/iphonesimulator/Runner.app

      - name: Package simulator app
        run: |
          cd build/ios/iphonesimulator
          zip -r ../../../sleep-talk-ios-simulator.zip Runner.app/
          echo "=== Simulator app package ==="
          ls -lh ../../../sleep-talk-ios-simulator.zip

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: sleep-talk-ios-simulator
          path: sleep-talk-ios-simulator.zip
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-build-${{ github.run_number }}
          name: Release v${{ env.APP_VERSION }} (Build ${{ github.run_number }})
          body: |
            ## Sleep Talk Recorder v${{ env.APP_VERSION }} (Build ${{ github.run_number }})

            ### Build Information
            - **Build Time:** ${{ github.event.head_commit.timestamp }}
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Triggered by:** ${{ github.actor }}

            ### Downloads
            - **Android APK:** Direct install for Android devices
            - **Android AppBundle (AAB):** For Google Play Store submission
            - **iOS Simulator App:** iOS simulator app (can run on iOS Simulator, no code signing needed)

            ### Notes
            - **Android APK:** Install directly on any Android device
            - **iOS Simulator App:** Unzip and drag `Runner.app` onto an iOS Simulator to test
            - **iOS Device:** Apple requires code signing for all device builds. To build for a real iPhone/iPad, you need a Mac and a free Apple ID (no paid developer account needed). See README for instructions.
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}